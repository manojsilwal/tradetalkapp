name: Vercel production deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "vercel.json"
      - ".github/workflows/vercel-production-deploy.yml"
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.ref }}
  # Manual dispatch runs were stuck queued for days when cancel-in-progress
  # kept superseding jobs that never acquired a runner.
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${VERCEL_DEPLOY_HOOK_URL}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set. Skipping deploy hook."
            exit 0
          fi
          curl -fsS -X POST "${VERCEL_DEPLOY_HOOK_URL}"
