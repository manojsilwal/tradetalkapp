# Dual-track QA: Track B (Yahoo parity) + optional Track A (Playwright).
# Does NOT run on every PR — schedule + manual only (see docs/QA_TEST_MATRIX.md).
name: QA dual-track

on:
  workflow_dispatch:
    inputs:
      e2e_profile:
        description: "Playwright — smoke (P0 landing/debate/strategy) or full e2e/"
        required: false
        default: full
        type: choice
        options:
          - smoke
          - full
  schedule:
    # 06:00 UTC daily — adjust if you prefer a quieter window
    - cron: "0 6 * * *"

concurrency:
  group: qa-dual-track-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yahoo-parity:
    name: Track B — Yahoo API parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Pin httpx for FastAPI TestClient compatibility
        run: pip install "httpx>=0.27,<0.28"
      - name: Run market data parity tests
        env:
          RUN_MARKET_PARITY: "1"
          MARKET_PARITY_TICKERS: SPY,AAPL,MSFT
          # Skip SP500 ingest / heavy startup paths if any
          SP500_INGEST_ON_STARTUP: "0"
        run: PYTHONPATH=. python -m unittest backend.tests.test_market_data_parity -v

  playwright-e2e:
    name: Track A — Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install root devDependencies (Playwright)
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Run E2E against public frontend
        env:
          # Optional repo variable: set FRONTEND_URL in GitHub → Settings → Variables
          FRONTEND_URL: ${{ vars.E2E_FRONTEND_URL }}
          E2E_PROFILE: ${{ github.event.inputs.e2e_profile }}
          RUN_DECISION_TERMINAL_DATA_AUDIT: "1"
        run: |
          if [ -z "$FRONTEND_URL" ] || [ "$FRONTEND_URL" = "" ]; then
            export FRONTEND_URL="https://frontend-manojsilwals-projects.vercel.app"
          fi
          PROFILE="${E2E_PROFILE:-full}"
          echo "FRONTEND_URL=$FRONTEND_URL"
          echo "E2E_PROFILE=$PROFILE"
          if [ "$PROFILE" = "full" ]; then
            npm run e2e -- --reporter=line
          else
            npm run e2e:smoke -- --reporter=line
          fi

  fincrawler-http:
    name: Optional — FinCrawler HTTP (deployed URL)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Set repository variable FINCRAWLER_URL (and secret FINCRAWLER_KEY if auth is enabled).
    if: ${{ vars.FINCRAWLER_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: GET /health + /quote via Playwright request
        env:
          FINCRAWLER_URL: ${{ vars.FINCRAWLER_URL }}
          FINCRAWLER_KEY: ${{ secrets.FINCRAWLER_KEY }}
          FINCRAWLER_POLYMARKET_E2E: "1"
        run: npm run e2e:fincrawler -- --reporter=line
