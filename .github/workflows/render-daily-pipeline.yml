# Triggers the FastAPI daily knowledge pipeline (backend on GCP Cloud Run or other URL).
# Required repo secrets:
#   TRADETALK_API_BASE — Cloud Run API URL (no trailing slash), e.g. https://tradetalk-api-xxxxx.run.app
#   PIPELINE_CRON_SECRET — must match PIPELINE_CRON_SECRET on the API service
name: Daily knowledge pipeline

on:
  schedule:
    - cron: "5 0 * * *" # 00:05 UTC daily
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: POST /knowledge/pipeline-run
        env:
          TRADETALK_API_BASE: ${{ secrets.TRADETALK_API_BASE }}
          SECRET: ${{ secrets.PIPELINE_CRON_SECRET }}
        run: |
          set -euo pipefail
          BASE="${TRADETALK_API_BASE:-}"
          test -n "${BASE:-}" || { echo "Set TRADETALK_API_BASE (Cloud Run URL) in repo secrets"; exit 1; }
          test -n "${SECRET:-}" || { echo "Set PIPELINE_CRON_SECRET in repo secrets (same as backend env)"; exit 1; }
          
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            if curl -fsS --max-time 900 -X POST "${BASE}/knowledge/pipeline-run" \
              -H "Authorization: Bearer ${SECRET}" \
              -H "Content-Type: application/json"; then
              echo "Pipeline triggered OK"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then sleep 30; fi
          done
          echo "Failed to trigger pipeline after 3 attempts"
          exit 1
