# Daily thematic macro_flow refresh on the FastAPI backend (GCP Cloud Run or other origin).
# Secrets: TRADETALK_API_BASE (Cloud Run URL); PIPELINE_CRON_SECRET (must match API env).
name: Macro flow daily refresh

on:
  schedule:
    - cron: "25 1 * * *" # 01:25 UTC — after US cash close window
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: POST /macro/flow/cron-refresh
        env:
          TRADETALK_API_BASE: ${{ secrets.TRADETALK_API_BASE }}
          SECRET: ${{ secrets.PIPELINE_CRON_SECRET }}
        run: |
          set -euo pipefail
          BASE="${TRADETALK_API_BASE:-}"
          test -n "${BASE:-}" || { echo "Set TRADETALK_API_BASE (Cloud Run URL) in repo secrets"; exit 1; }
          test -n "${SECRET:-}" || { echo "Set PIPELINE_CRON_SECRET in repo secrets"; exit 1; }
          curl -fsS --max-time 900 -X POST "${BASE}/macro/flow/cron-refresh?interval=1w" \
            -H "Authorization: Bearer ${SECRET}" \
            -H "Content-Type: application/json"
