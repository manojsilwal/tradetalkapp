# Weekly batch ETL: yfinance profile chunks → HF Dataset Parquet + Supabase yf_batch_chunks.
# Secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, OPENROUTER_API_KEY
# Optional secret: OPENROUTER_EMBEDDING_MODEL (defaults to openai/text-embedding-3-small if unset)
# Optional: HF_DATASET_ID, HF_TOKEN, BATCH_ETL_TICKERS (comma-separated)

name: Batch ETL (HF + Supabase)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 0"

jobs:
  etl:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_EMBEDDING_MODEL: ${{ secrets.OPENROUTER_EMBEDDING_MODEL }}
      HF_DATASET_ID: ${{ secrets.HF_DATASET_ID }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Secrets are empty if never configured (or on forks without secrets). Fail fast with a
      # clear pointer — the Python pipeline only returns JSON and exit 1 otherwise.
      - name: Verify Supabase + OpenRouter secrets
        run: |
          missing=0
          if [ -z "${SUPABASE_URL}" ]; then
            echo "::error::SUPABASE_URL is not set. Add it under GitHub → Settings → Secrets and variables → Actions (repository secret)."
            missing=1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY is not set. Add the Supabase service role key under Actions secrets (same page as SUPABASE_URL)."
            missing=1
          fi
          if [ -z "${OPENROUTER_API_KEY}" ]; then
            echo "::error::OPENROUTER_API_KEY is not set. Batch ETL needs it for embeddings before Supabase upsert. Add it under Actions secrets."
            missing=1
          fi
          exit "${missing}"

      - name: Run batch ETL
        run: |
          TICKERS="${BATCH_ETL_TICKERS:-SPY,AAPL,MSFT}"
          # Missing secret yields empty env; bash :- supplies the same default as batch_etl.pipeline.
          export OPENROUTER_EMBEDDING_MODEL="${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}"
          PYTHONPATH=. python backend/scripts/batch_etl_hf_supabase.py --tickers "$TICKERS"
        env:
          BATCH_ETL_TICKERS: ${{ vars.BATCH_ETL_TICKERS }}
