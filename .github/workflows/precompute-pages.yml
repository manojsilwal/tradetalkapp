# Precompute the three "global" pages so they load instantly from a durable snapshot
# instead of a blank "click Run" state.
#
# PRIMARY trigger: GCP Cloud Scheduler (see scripts/deploy_precompute_scheduler.sh).
# This workflow is a MANUAL FALLBACK only (Actions → Run workflow).
#
# Required repo secrets:
#   TRADETALK_API_BASE   — Cloud Run API URL (no trailing slash)
#   PIPELINE_CRON_SECRET — must match PIPELINE_CRON_SECRET on the API service
#   FUND_LB_ADMIN_TOKEN  — (weekly leaderboard only) matches FUND_LB_ADMIN_TOKEN on the API
name: Precompute global pages

on:
  workflow_dispatch:

jobs:
  precompute:
    runs-on: ubuntu-latest
    steps:
      - name: Picks & Shovels (daily, synchronous)

        env:
          BASE: ${{ secrets.TRADETALK_API_BASE }}
          SECRET: ${{ secrets.PIPELINE_CRON_SECRET }}
        run: |
          set -euo pipefail
          test -n "${BASE:-}" || { echo "Set TRADETALK_API_BASE"; exit 1; }
          test -n "${SECRET:-}" || { echo "Set PIPELINE_CRON_SECRET"; exit 1; }
          curl -fsS --max-time 900 -X POST "${BASE}/knowledge/picks-shovels-run" \
            -H "Authorization: Bearer ${SECRET}" -H "Content-Type: application/json"

      - name: Narrative Rotation Radar (daily, synchronous)

        env:
          BASE: ${{ secrets.TRADETALK_API_BASE }}
          SECRET: ${{ secrets.PIPELINE_CRON_SECRET }}
        run: |
          set -euo pipefail
          curl -fsS --max-time 900 -X POST "${BASE}/knowledge/narrative-radar-run" \
            -H "Authorization: Bearer ${SECRET}" -H "Content-Type: application/json"

      - name: Fund Leaderboard 13F ingest (weekly)

        env:
          BASE: ${{ secrets.TRADETALK_API_BASE }}
          ADMIN: ${{ secrets.FUND_LB_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${BASE:-}" || { echo "Set TRADETALK_API_BASE"; exit 1; }
          # Heavy/long 13F ingest runs in the background on the API; for maximum
          # reliability point this at the Cloud Run Job instead (see pipeline_ops).
          curl -fsS --max-time 120 -X POST "${BASE}/api/funds/ingest/run" \
            ${ADMIN:+-H "X-Admin-Token: ${ADMIN}"} -H "Content-Type: application/json" || \
            echo "Leaderboard ingest kick returned non-zero (may already be running)"
