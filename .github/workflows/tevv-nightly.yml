# Phase E — TEVV deterministic chat eval (golden / edge / failure cases).
# Runs on PRs and nightly; does not require OPENROUTER (no live LLM in harness v1).
name: TEVV eval harness

on:
  pull_request:
    paths:
      - "backend/eval/**"
      - "backend/chat_evidence_contract.py"
      - "backend/chat_service.py"
      - "backend/knowledge_store.py"
      - "backend/rag_retrieval.py"
      - "backend/routers/chat.py"
      - "backend/tests/test_tevv_harness.py"
      - ".github/workflows/tevv-nightly.yml"
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *"

concurrency:
  group: tevv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tevv:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Pin httpx for FastAPI TestClient compatibility
        run: pip install "httpx>=0.27,<0.28"
      - name: Run TEVV harness (CLI)
        env:
          SP500_INGEST_ON_STARTUP: "0"
        run: PYTHONPATH=. python -m backend.eval.tevv_runner --json
      - name: Run TEVV unit test
        env:
          SP500_INGEST_ON_STARTUP: "0"
        run: PYTHONPATH=. python -m unittest backend.tests.test_tevv_harness -v
