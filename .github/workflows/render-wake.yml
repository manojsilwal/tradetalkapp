# Optional keep-warm GET for backends that scale to zero (free tier / min instances = 0).
# Prefer TRADETALK_API_BASE (GCP Cloud Run URL); legacy RENDER_API_BASE still works.
name: API wake (GET /docs)

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: GET /docs
        env:
          TRADETALK_API_BASE: ${{ secrets.TRADETALK_API_BASE }}
          RENDER_API_BASE: ${{ secrets.RENDER_API_BASE }}
        run: |
          set -euo pipefail
          BASE="${TRADETALK_API_BASE:-${RENDER_API_BASE:-}}"
          test -n "${BASE:-}" || { echo "Set TRADETALK_API_BASE or legacy RENDER_API_BASE in repo secrets"; exit 1; }
          curl -fsS --max-time 120 --retry 2 --retry-delay 5 "${BASE}/docs" -o /dev/null
          echo "OK"
