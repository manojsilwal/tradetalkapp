# Keeps Render free-tier web service awake by sending periodic GET traffic.
# Required repo secret: RENDER_API_BASE (e.g. https://tradetalkapp-backend.onrender.com — no trailing slash)
name: Render wake (GET /docs)

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: GET /docs
        env:
          BASE: ${{ secrets.RENDER_API_BASE }}
        run: |
          set -euo pipefail
          test -n "${BASE:-}" || { echo "Set RENDER_API_BASE in repo secrets"; exit 1; }
          curl -fsS --max-time 120 --retry 2 --retry-delay 5 "${BASE}/docs" -o /dev/null
          echo "OK"
