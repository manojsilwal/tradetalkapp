# Predictor synthesis / reviewer routing (OpenRouter model slugs).
# Reviewer primary MUST differ from synthesis vendor prefix — enforced by CI.

predictor:
  synthesis:
    primary: "openai/gpt-5.5"
    fallback: "openai/gpt-5-mini"
    temperature: 0.2
    max_tokens: 1500
  reviewer:
    primary: "google/gemini-3-flash"
    fallback: "anthropic/claude-opus-4.6"
    temperature: 0.0
    max_tokens: 800
