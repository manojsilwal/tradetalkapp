# Predictor synthesis / reviewer routing — NVIDIA Pro → Flash → Gemini 3.5 Flash.
# Temperature and max_tokens are read by the predictor; model cascade is handled
# in code (synthesizer.py / reviewer.py) and honours NVIDIA_LLM_MODEL_PRO,
# NVIDIA_LLM_MODEL_FLASH, and GEMINI_MODEL env vars.

predictor:
  synthesis:
    temperature: 0.2
    max_tokens: 1500
  reviewer:
    temperature: 0.0
    max_tokens: 800
