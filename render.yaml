services:
  - type: web
    name: tradetalkapp-backend
    runtime: python
    # rootDir intentionally NOT set — we run from the repo root so that
    # 'backend' is a proper Python package and relative imports work correctly.
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GUARDRAILS_ENABLE
        value: "1"
      - key: GUARDRAILS_STRICT_STARTUP
        value: "0"
      # Vector storage: Supabase survives Render restarts (Chroma on free tier is ephemeral).
      # Set SUPABASE_SERVICE_ROLE_KEY in Render Dashboard → Environment (secret).
      - key: VECTOR_BACKEND
        value: supabase
      - key: SUPABASE_URL
        value: https://bvhdrwyxzjcoyqzmtean.supabase.co
      # Comma-separated list of allowed CORS origins (your Vercel URL goes here)
      - key: CORS_ORIGINS
        value: https://frontend-manojsilwals-projects.vercel.app
      # Optional: set PIPELINE_CRON_SECRET in the Render Dashboard (secret) to lock down
      # POST /knowledge/pipeline-run and POST /knowledge/sp500-ingest. Match GitHub secret.
      # Optional: DATA_LAKE_DAILY_INCREMENTAL=0 to skip heavy Parquet work on free tier.
      # Yahoo Finance rate-limits datacenter IPs — do not run heavy SP500 ingest at startup.
      - key: SP500_INGEST_ON_STARTUP
        value: "0"

      # FinCrawler (optional): FINCRAWLER_KEY must match FinCrawler service API_KEY (set in Dashboard).
      - key: FINCRAWLER_URL
        value: https://fincrawler.onrender.com
      - key: FINCRAWLER_KEY
        sync: false

      # ── Phase C1 + C2 — SEPL-for-TOOLs rollout.
      # Live in production with kill switch active. Safety still enforced by:
      #   • SEPL_TOOL_MIN_MARGIN (5 pp beat required to commit)
      #   • Tier-aware daily caps: tier-0=2, tier-1=1, tier-2+=0 (hardcoded)
      #   • Kill switch SEPL_TOOL_ROLLBACK_MARGIN (5 pp regression → auto-restore)
      #   • Offline fixture-only scoring (no live traffic, no LLM calls in Improve)
      # See docs/TOOL_EVOLUTION.md for the full contract.
      - key: SEPL_TOOL_ENABLE
        value: "1"
      - key: SEPL_TOOL_DRY_RUN
        value: "0"
      - key: SEPL_TOOL_AUTOCOMMIT
        value: "1"
      - key: SEPL_TOOL_INTERVAL_HOURS
        value: "24"
      - key: SEPL_TOOL_MIN_MARGIN
        value: "0.05"
      - key: SEPL_TOOL_ROLLBACK_MARGIN
        value: "0.05"
      - key: SEPL_TOOL_ROLLBACK_WINDOW_HOURS
        value: "168"
      - key: SEPL_TOOL_MAX_PER_DAY
        value: "2"
      - key: SEPL_TOOL_MAX_PER_DAY_TIER_0
        value: "2"
      - key: SEPL_TOOL_MAX_PER_DAY_TIER_1
        value: "1"
      - key: SEPL_TOOL_MAX_PER_DAY_TIER_2
        value: "0"
      - key: SEPL_TOOL_MAX_PER_DAY_TIER_3
        value: "0"
      - key: SEPL_TOOL_MAX_PERTURB_STEPS
        value: "4"
      - key: SEPL_TOOL_CANDIDATES_PER_CYCLE
        value: "4"
