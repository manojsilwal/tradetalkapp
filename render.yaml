services:
  - type: web
    name: tradetalkapp-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # rootDir is already 'backend', so the module is main:app (not backend.main:app)
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Comma-separated list of allowed CORS origins (your Vercel URL goes here)
      - key: CORS_ORIGINS
        value: https://frontend-manojsilwals-projects.vercel.app
