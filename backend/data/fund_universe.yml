# Curated universe of well-known institutional 13F filers.
#
# Used by fund_leaderboard_universe.build_universe(ranking_mode="EXTERNAL_AUM_CURATED"
# or "CUSTOM_WATCHLIST") and as a fallback when the SEC bulk dataset is unavailable.
#
# Fields:
#   cik               SEC Central Index Key of the 13F *filing manager* (no leading
#                     zeros). MUST be the correct filer CIK — a wrong CIK silently
#                     pulls another manager's holdings and produces bogus returns.
#   name              Display name.
#   manager_type      hedge_fund | asset_manager | bank | family_office | activist |
#                     holding_company.
#   external_aum_usd  Approximate, human-curated AUM used ONLY for ranking in curated
#                     mode. Coarse (order-of-magnitude), not displayed as a precise
#                     figure, not authoritative.
#   strategy_tags     Short tags surfaced in the UI.
#   philosophy        One-line plain-English description of the manager's investing
#                     philosophy, surfaced on the leaderboard + fund drawer.
#
# Returns shown on the leaderboard are reconstructed from the *long* 13F equity book
# only (no shorts/puts/leverage/cash/non-US). Funds whose edge is options- or
# short-driven (e.g. Situational Awareness) are flagged "emerging" with returns N/A
# rather than a misleading clone number when they lack ~8 quarters of history.
