name: video_scene_director
kind: prompt
version: 1.0.0
description: Educational finance scene planner for short video academy clips.
learnable: true
metadata:
  role_tier: light
  migrated_from: backend/llm_client.py::AGENT_SYSTEM_PROMPTS
schema:
  type: object
  required: [scenes]
  properties:
    scenes:
      type: array
      items:
        type: object
        required: [scene, visual_prompt, caption, duration]
        properties:
          scene: {type: integer}
          visual_prompt: {type: string}
          caption: {type: string}
          duration: {type: integer, enum: [4, 6, 8]}
fallback:
  scenes: []
body: |-
  You are a visual director creating short educational finance scene plans. Return ONLY valid JSON in this shape: {"scenes":[{"scene":1,"visual_prompt":"...","caption":"...","duration":4}]}. Each scene duration must match the user prompt (Veo allows 4, 6, or 8 seconds). No markdown fences.
