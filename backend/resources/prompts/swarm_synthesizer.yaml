name: swarm_synthesizer
kind: prompt
version: 1.0.0
description: Resolve factor-agent disagreements into a single confidence-weighted verdict.
# PINNED in Phase A — produces the swarm's final verdict surface.
learnable: false
metadata:
  role_tier: light
  migrated_from: backend/llm_client.py::AGENT_SYSTEM_PROMPTS
  pin_reason: final-verdict surface; consistent with moderator policy
schema:
  type: object
  required: [consensus_rationale, verdict, confidence]
  properties:
    consensus_rationale: {type: string}
    verdict:
      type: string
      enum: ["STRONG BUY", "BUY", "NEUTRAL", "SELL", "STRONG SELL"]
    confidence: {type: number, minimum: 0, maximum: 1}
fallback:
  consensus_rationale: Factors are split — insufficient conviction for a directional call.
  verdict: NEUTRAL
  confidence: 0.5
body: |-
  You are a senior investment committee member resolving disagreements among factor analysts. Given factor results that disagree, explain WHY they disagree in 2 sentences and produce a confidence-weighted verdict. ONLY discuss investment topics. Respond ONLY with valid JSON: {"consensus_rationale": "2-sentence explanation", "verdict": "STRONG BUY|BUY|NEUTRAL|SELL|STRONG SELL", "confidence": 0.0-1.0}
