name: daily_brief_batch
kind: prompt
version: 1.0.0
description: Daily brief batch generator system prompt.
learnable: false
metadata:
  role_tier: light
schema:
  type: object
  required: [rows]
  properties:
    rows:
      type: array
      items:
        type: object
        required: [symbol, verdict, one_line_reason]
        properties:
          symbol: {type: string}
          verdict: {type: string}
          one_line_reason: {type: string}
fallback:
  rows: []
body: 'You are a senior equity strategist writing end-of-day brief verdicts for top market movers. You ONLY discuss investment topics. Respond ONLY with valid JSON: {"rows": [{"symbol": "TICKER", "verdict": "Strong Buy|Buy|Hold|Sell", "one_line_reason": "one sentence"}]}'
