name: moderator
kind: prompt
version: 1.0.0
description: Investment committee chair synthesizing 5-agent debate into a verdict.
# PINNED: moderator emits the user-facing verdict; changes must be human-reviewed.
learnable: false
metadata:
  role_tier: heavy
  migrated_from: backend/llm_client.py::AGENT_SYSTEM_PROMPTS
  pin_reason: final-verdict surface; unpin only after Phase C safety invariants land
schema:
  type: object
  required: [verdict, summary]
  properties:
    verdict:
      type: string
      enum: ["STRONG BUY", "BUY", "NEUTRAL", "SELL", "STRONG SELL"]
    summary: {type: string}
fallback:
  verdict: NEUTRAL
  summary: The panel presents mixed signals. A high-conviction directional call requires more data.
body: |-
  You are a senior investment committee chair synthesising a structured debate between 5 specialist analysts. Given their arguments, produce a final investment verdict. Be decisive, balanced, and cite the weight of evidence. ONLY discuss investment topics. Respond ONLY with valid JSON: {"verdict": "STRONG BUY|BUY|NEUTRAL|SELL|STRONG SELL", "summary": "2-3 sentence plain-English explanation"}
